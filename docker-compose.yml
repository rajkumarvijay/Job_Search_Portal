version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobportal_db
    environment:
      POSTGRES_USER: jobportal
      POSTGRES_PASSWORD: jobportal
      POSTGRES_DB: jobportal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobportal_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://jobportal:jobportal@postgres:5432/jobportal
      ALLOWED_ORIGINS: "*"
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
